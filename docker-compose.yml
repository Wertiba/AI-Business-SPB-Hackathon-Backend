services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql
  app:
   build:
     context: .
     dockerfile: Dockerfile
   volumes:
     - ./:/app
   working_dir: /app
   depends_on:
     - db
   env_file:
     - .env
   ports:
     - "8000:8000"
   command: uv run fastapi run app/main.py

volumes:
  db_data: